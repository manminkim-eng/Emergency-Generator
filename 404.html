<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>발전설비</title>
<meta name="theme-color" content="#0f2744"/>
<style>
  body{margin:0;background:#0d1c30;color:#e2e8f0;font-family:'Noto Sans KR',sans-serif;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       min-height:100vh;gap:16px;}
  .ico{font-size:48px;}
  .ttl{font-size:18px;font-weight:800;}
  .sub{font-size:12px;color:#64748b;}
</style>
<script>
/* GitHub Pages SPA redirect */
(function(){
  var l=window.location;
  var seg=l.pathname.split('/').slice(0,2).join('/');
  l.replace(l.protocol+'//'+l.host+seg+
    '/?r='+encodeURIComponent(l.pathname.slice(seg.length+1))+
    (l.search?'&q='+encodeURIComponent(l.search.slice(1)):'')+l.hash);
})();
</script>
</head>
<body>
  <div class="ico">⚡</div>
  <div class="ttl">발전설비</div>
  <div class="sub">페이지를 불러오는 중...</div>
</body>
</html>
